name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # --severity=warning skips info-level findings (SC1091 for the
        # $SCRIPT_DIR/lib/common.sh source path that shellcheck can't follow
        # statically, and SC2016 for intentional unexpanded $VAR inside
        # literals we append to user dotfiles).
        run: |
          shellcheck --severity=warning \
            bootstrap/bootstrap.sh \
            bootstrap/lib/*.sh \
            bootstrap/roles/*.sh \
            tests/run-local.sh

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -diff
      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  # Full bootstrap + bats E2E suite on a self-hosted runner (your devbox).
  # Triggered only when the PR body or a commit message contains [e2e],
  # or when a maintainer manually dispatches via workflow_dispatch.
  # The runner uses Multipass to spin up a throwaway Ubuntu 24.04 VM,
  # runs bootstrap inside it, then tears it down. KVM must be available.
  e2e:
    runs-on: self-hosted
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.body, '[e2e]') ||
      contains(github.event.head_commit.message, '[e2e]')
    steps:
      - uses: actions/checkout@v4
      - name: Install prerequisites (bats-core, multipass)
        run: |
          sudo apt-get install -y bats
          if ! command -v multipass >/dev/null 2>&1; then
            sudo snap install multipass
          fi
      - name: Run E2E suite via run-local.sh
        run: bash tests/run-local.sh
        timeout-minutes: 30

  # Manually trigger the full E2E suite from the Actions UI or gh CLI:
  #   gh workflow run ci.yml --field ref=<branch>
  workflow_dispatch_e2e:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    needs: []
    steps:
      - uses: actions/checkout@v4
      - name: Run E2E suite
        run: bash tests/run-local.sh
        timeout-minutes: 30
