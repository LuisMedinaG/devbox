name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        # --severity=warning skips info-level findings (SC1091 for the
        # $SCRIPT_DIR/lib/common.sh source path that shellcheck can't follow
        # statically, and SC2016 for intentional unexpanded $VAR inside
        # literals we append to user dotfiles).
        run: |
          shellcheck --severity=warning \
            bootstrap/bootstrap.sh \
            bootstrap/lib/*.sh \
            bootstrap/roles/*.sh \
            tests/run-local.sh

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -diff
      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  acai-push:
    runs-on: ubuntu-latest
    # Only push when we have a token — skips forks and PRs from external contributors.
    if: ${{ secrets.ACAI_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so acai can resolve commit SHAs
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Push specs and ACID refs to acai.sh
        run: npx @acai.sh/cli push --all
        env:
          ACAI_API_TOKEN: ${{ secrets.ACAI_API_TOKEN }}

