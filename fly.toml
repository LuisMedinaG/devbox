app = "lumedina-devbox"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "devbox_data"
  destination = "/home"

[[vm]]
  size = "performance-2x"
  memory = "4gb"

[[restart]]
  policy = "always"

# No [[services]] = no public ports, no traffic-based auto-stop.
# Machine runs until manually stopped or process crashes (restarted by policy above).
