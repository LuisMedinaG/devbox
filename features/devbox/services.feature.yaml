feature:
  name: services
  product: devbox
  description: Opt-in and default service roles — Caddy reverse proxy and Ollama local LLM server.

components:
  CADDY:
    name: Reverse Proxy
    description: Role 43-caddy — installs Caddy from the official apt repo as a persistent systemd service and establishes the conf.d include pattern for future service roles.
    requirements:
      1: Installs Caddy from the official Cloudsmith-hosted apt repository, verified via GPG keyring
      2: Writes /etc/caddy/Caddyfile with a health endpoint (GET /health → 200 OK) and an import directive for /etc/caddy/conf.d/*.conf
      2-note: Caddyfile is written only once; the sentinel comment "# bootstrap.CADDY" guards against overwriting on re-runs
      3: Creates /etc/caddy/conf.d/ for service-specific Caddy snippets; future service roles drop files here without modifying the base Caddyfile
      4: Opens TCP ports 80 and 443 in UFW when UFW is active
      5: Enables and starts the caddy systemd service; reloads config if caddy was already running when the Caddyfile changed

  OLLAMA:
    name: Local LLM Server
    description: Role svc-ollama — opt-in service role that installs Ollama for local LLM inference. Not in the default role sequence; run with bootstrap.sh svc-ollama.
    requirements:
      1: Downloads the official Ollama release archive (tar.zst), verifies sha256 before extracting, installs binary to /usr/local/bin/ollama
      2: Creates a dedicated ollama system account (no login shell) and stores models in /var/lib/ollama/models
      3: Writes a systemd service unit that runs ollama serve as the ollama user with OLLAMA_HOST=0.0.0.0:11434; enables and starts it
      3-note: Port 11434 is not opened in UFW — Tailscale mesh provides access without public exposure
      4: Drops a commented-out Caddy snippet at /etc/caddy/conf.d/ollama.conf as a reference for adding HTTPS via a domain later
