feature:
  name: bootstrap
  product: devbox
  description: Idempotent provisioning system for a fresh Ubuntu 24.04 host. Runs as root and sets up system baseline, user, security hardening, networking, dev tools, container runtime, shell, and language runtimes.

components:
  SYSTEM:
    name: System Baseline
    description: Role 00-system — OS-level foundations applied before any other role.
    requirements:
      1: Sets the host timezone from the TIMEZONE environment variable
      2: Enables unattended security upgrades with automatic nightly reboot at 02:00 when no users are logged in
      3: Creates a 2 GB swapfile if no swap is currently active, and persists it in /etc/fstab
      4: Configures sysctl for low swappiness (10), BBR TCP congestion control, and FQ qdisc
      5: Rotates bootstrap logs weekly, keeping 8 weeks of history
      6: Suppresses MOTD noise (pending-update counts, ESM ads, release-upgrade nags) since unattended-upgrades handles patching

  USER:
    name: User Provisioning
    description: Role 10-user — creates the interactive user and configures SSH access.
    requirements:
      1: Creates the user defined by USERNAME if it does not already exist
      2: Enables systemd linger for the user so user services survive logout
      3: Grants only a narrow sudo allowlist — no NOPASSWD:ALL
      3-note: Only /usr/bin/apt-get update is allowed without a password
      4: Installs SSH authorized keys from config/ssh-authorized-keys, falling back to /root/.ssh/authorized_keys if not present
      4-1: Aborts if no SSH key source is available, to prevent lock-out

  HARDENING:
    name: SSH and Service Hardening
    description: Role 20-hardening — SSH drop-in config and fail2ban. UFW is handled separately by role 31-firewall, which runs after Tailscale to prevent lock-out.
    requirements:
      1: Disables root login over SSH
      2: Disables password authentication over SSH; public key only
      3: Disables X11 forwarding
      4: Configures and enables fail2ban with the sshd jail active
      4-note: fail2ban runs even when SKIP_FIREWALL=1; that flag only suppresses UFW
      7: When SKIP_SSH_HARDENING=1 (or DEV_MODE=1), the sshd_config drop-in is NOT written and any previous one is removed
      7-note: Dev-only escape hatch — leaves Hetzner-default sshd (root login + password auth); fail2ban still runs
      7-1: tests/e2e.bats detects DEV_MODE state from on-disk artifacts (presence of /etc/ssh/sshd_config.d/10-hardening.conf, `ufw status`) and skips the affected hardening/UFW assertions accordingly — tests do not read bootstrap-time env vars

  TAILSCALE:
    name: Tailscale Networking
    description: Role 30-tailscale — installs Tailscale and enrolls the host into the tailnet. UFW port 22 restriction is handled by role 31-firewall after this role completes.
    requirements:
      1: Installs and enables the tailscaled service
      2: Connects to the tailnet with Tailscale SSH enabled (tailscale up --ssh)
      3: Accepts an optional TS_AUTHKEY for unattended enrollment
      3-1: Clears TS_AUTHKEY from the environment immediately after role 30 completes so no other role inherits it
      4: TS_AUTHKEY must never appear in bootstrap log files
      5: Reads MACHINE_NAME (default "devbox") and TS_TAG (default "tag:${MACHINE_NAME}") env vars to set --hostname and --advertise-tags
      5-note: Defaults preserve backwards compatibility when bootstrap is invoked without Terraform (manual paste workflow)

  FIREWALL:
    name: Firewall (UFW)
    description: Role 31-firewall — runs after Tailscale so public SSH is never closed before the Tailscale overlay is available.
    requirements:
      1: Activates UFW with default deny-incoming policy
      2: Opens SSH (port 22) and Mosh (UDP 60000-61000) in UFW
      2-note: UFW initialization is skipped if already active, to preserve rules added by later roles
      3: Once Tailscale is connected, restricts port 22 to the Tailscale CGNAT range (100.64.0.0/10) and removes the broad OpenSSH UFW rule
      3-note: If Tailscale is not connected, port 22 remains open and a warning is emitted; re-running ensures recovery is always possible

  DEV_TOOLS:
    name: Developer Tools
    description: Role 40-dev-tools — installs the core CLI toolchain.
    requirements:
      1: Installs git, tmux, zsh, ripgrep, fzf, btop, neovim, zoxide, eza, python3, mosh, yadm, pipx

  CADDY:
    name: Reverse Proxy
    description: Role 43-caddy — installs Caddy from the official apt repo as a persistent systemd service and establishes the conf.d include pattern for future service roles.
    requirements:
      1: Installs Caddy from the official Cloudsmith-hosted apt repository, verified via GPG keyring
      2: Writes /etc/caddy/Caddyfile with a health endpoint (GET /health → 200 OK) and an import directive for /etc/caddy/conf.d/*.conf
      2-note: Caddyfile is written only once; the sentinel comment "# bootstrap.CADDY" guards against overwriting on re-runs
      3: Creates /etc/caddy/conf.d/ for service-specific Caddy snippets; future service roles drop files here without modifying the base Caddyfile
      4: Opens TCP ports 80 and 443 in UFW when UFW is active
      5: Enables and starts the caddy systemd service; reloads config if caddy was already running when the Caddyfile changed

  DOCKER:
    name: Container Runtime
    description: Role 42-docker — rootless Podman for the interactive user.
    requirements:
      1: Installs rootless Podman for the USERNAME user
      2: User is NOT added to any docker group
      3: Podman reports rootless=true when invoked as the user
      4: Enables the per-user Podman socket (podman.socket) via systemd --user
      5: Exports DOCKER_HOST pointing at the Podman socket in ~/.zshenv.local so Dev Containers tooling works without Docker
      6: Ensures subuid/subgid ranges are allocated for the user (100000-165535) if not already set
      7: Installs podman-compose and writes a /usr/local/bin/docker-compose shim so VS Code Dev Containers compose-based workflows resolve the docker-compose command via Podman

  SHELL:
    name: Shell Configuration
    description: Role 50-shell — sets zsh as the default shell and writes machine-specific PATH entries.
    requirements:
      1: Sets zsh as the default shell for USERNAME
      2: Creates an empty ~/.zshrc if one does not exist, so yadm clone has a file to replace
      2-note: Bootstrap must not write any config into ~/.zshrc itself; dotfiles own that file
      3: Writes machine-specific PATH entries (fnm, cargo, go, ~/.local/bin) to ~/.zshrc.local, not to files tracked by dotfiles
      4: Sets zsh as the default shell for root and writes a minimal /root/.zshrc (history, prompt, guarded aliases for eza/nvim); no plugins, no mise, no user-scoped paths

  LANGS:
    name: Language Runtimes
    description: Role 60-langs — installs pinned language runtimes with sha256 verification.
    requirements:
      1: Installs fnm (Fast Node Manager) at the version pinned in versions.conf, then installs and defaults the latest LTS Node
      2: Installs uv and uvx (Python toolchain) at the version pinned in versions.conf
      3: Installs Bun at the version pinned in versions.conf
      4: Installs Rust via a pinned rustup-init binary
      5: Installs Go at the version pinned in versions.conf to /usr/local/go
      6: Aborts if any sha256 hash entry in versions.conf is empty or missing
      7: Verifies the sha256 of every downloaded artifact before executing or extracting it; aborts on mismatch
      7-note: Downloads are skipped if the file is already present and the hash matches, making re-runs fast
      8: Supports both amd64 and arm64 architectures; aborts on any other architecture

  TERRAFORM:
    name: Infrastructure Provisioning
    description: terraform/ — declarative Hetzner Cloud provisioning. A single `terraform apply` creates the server, generates a Tailscale auth key, and drives bootstrap.sh on first boot via cloud-init.
    requirements:
      1: Provisions a Hetzner Cloud server with configurable name, type, image, and location
      2: Attaches SSH keys by referencing existing Hetzner project keys by name, not by uploading them
      2-note: At least one ssh_key_names entry is required; the validation rejects empty or whitespace-only entries
      3: Accepts the Hetzner API token via HCLOUD_TOKEN environment variable or terraform.tfvars (gitignored)
      4: Outputs the server's public IPv4 address after apply
      5: Single var.hostname controls the Hetzner server name, the Tailscale device hostname, and (when var.tailscale_tag is unset) the derived tag:${hostname} ACL tag
      5-note: Changing var.hostname requires manual server replacement; the in-place hcloud_server name update will not change the OS hostname inside the box
      6: Generates a one-time, short-lived Tailscale auth key per apply via tailscale_tailnet_key (preauthorized, non-reusable, non-ephemeral, 1-hour expiry)
      7: Pre-flight cleanup deletes any existing Tailscale device with the same hostname before the new server joins (null_resource.tailscale_preflight, triggered by hostname/OAuth/tailnet)
      8: Destroy-time cleanup removes the Tailscale device on `terraform destroy` (null_resource.tailscale_cleanup)
      8-note: Both cleanup resources call a shared script terraform/scripts/tailscale-device.sh that performs OAuth token exchange and device deletion via the Tailscale API
      9: Cloud-init user_data drives bootstrap.sh on first boot — clones the devbox repo and runs bootstrap with USERNAME, MACHINE_NAME, TS_TAG, TS_AUTHKEY, and DOTFILES_REPO injected from Terraform variables
      9-note: hcloud_server.lifecycle.ignore_changes = [user_data] prevents auth-key churn on re-apply from forcing a server replacement; cloud-init only runs on first boot regardless
      9-1: Cloud-init writes /etc/devbox-bootstrap.env (mode 0600) with the injected env vars so re-runs can source it instead of mining /var/lib/cloud/instance/user-data.txt
      9-2: Cloud-init installs /usr/local/bin/devbox-rerun — a helper that sources the env file, pulls latest, and re-runs bootstrap (or a single role)
      9-3: Cloud-init writes /var/log/bootstrap/STATE with a single-line marker (`running`, `ok`, or `failed:<rc>`) — fast health check without parsing log output
      10: USER_PASSWORD is intentionally NOT injected via cloud-init — Hetzner stores user_data for the lifetime of the server (readable via the API), so long-lived secrets must be set manually post-bootstrap
      10-note: Acceptable trade-off for TS_AUTHKEY because it has 1-hour expiry and single-device-join scope; documented in cloud-init.yaml.tpl header and README

  VERSIONS:
    name: Version Management
    description: bootstrap/update-versions.sh — checks and updates pinned runtime versions in config/versions.conf.
    requirements:
      1: In check mode (default), reports which tools are up to date and which have a newer upstream release
      2: In update mode (--update flag), rewrites versions.conf in place with new versions and sha256 hashes
      3: Supports filtering to a single tool by passing its name as an argument
      4: Fetches upstream release info without executing downloaded artifacts (hash-only fetch for sha256 computation)
      5: Validates that fetched versions are valid semver before writing; skips tools where the upstream version cannot be parsed
      6: Supports GITHUB_TOKEN to avoid API rate limiting when fetching GitHub release metadata

  DOTFILES:
    name: Dotfiles Deployment
    description: Role 80-dotfiles — clones and bootstraps user dotfiles via yadm.
    requirements:
      1: Clones the dotfiles git repo via yadm as the interactive user
      2: Runs yadm bootstrap to install user-level tooling (Homebrew packages, configs)
      2-note: Fails gracefully with a warning if GitHub SSH is not configured yet
      3: Attempts HTTPS clone first (no credentials needed for public repos); falls back to SSH if HTTPS fails
      4: When cloning via SSH, pre-checks GitHub connectivity with BatchMode=yes, ConnectTimeout=10, and StrictHostKeyChecking=accept-new so authentication failures surface in seconds instead of hanging
      5: Passes --no-bootstrap to yadm clone and runs yadm bootstrap explicitly afterward, avoiding interactive prompts and double-runs in non-TTY contexts

  CLAUDE_CODE:
    name: Claude Code
    description: Role 70-claude-code — installs Claude Code globally via npm and the claude-mem MCP server.
    requirements:
      1: Installs @anthropic-ai/claude-code globally via npm as the interactive user
      2: Installs the claude-mem MCP server (npx --yes claude-mem install) into the user's plugin cache when not already present
      2-1: claude-mem install MUST run non-interactively — stdin is redirected from /dev/null at the call site so the same code path works whether bootstrap is launched by cloud-init or a human SSH session
      2-2: Non-interactive install accepts these recommended defaults (sourced from claude-mem's own !isTTY branch in dist/npx-cli/index.js):
        - ide=claude-code
        - runtime=worker
        - provider=claude
        - auth_method=subscription
        - model=claude-haiku-4-5-20251001
      2-3: Worker auto-start is disabled during install (--no-auto-start); the role starts the worker explicitly afterwards via `claude-mem start` so it is running when bootstrap finishes
      2-4: Subscription auth requires the user to be logged into the `claude` CLI on the host before claude-mem can compress observations; first login is a manual post-bootstrap step (interactive `claude` invocation)
      2-5: Overrides for non-default config are passed as install flags (--ide, --provider, --model) or env vars (CLAUDE_MEM_CLAUDE_AUTH_METHOD, ANTHROPIC_API_KEY) — never by removing the stdin redirect

  OLLAMA:
    name: Local LLM Server
    description: Role svc-ollama — opt-in service role that installs Ollama for local LLM inference. Not in the default role sequence; run with bootstrap.sh svc-ollama.
    requirements:
      1: Downloads the official Ollama release archive (tar.zst), verifies sha256 before extracting, installs binary to /usr/local/bin/ollama
      2: Creates a dedicated ollama system account (no login shell) and stores models in /var/lib/ollama/models
      3: Writes a systemd service unit that runs ollama serve as the ollama user with OLLAMA_HOST=0.0.0.0:11434; enables and starts it
      3-note: Port 11434 is not opened in UFW — Tailscale mesh provides access without public exposure
      4: Drops a commented-out Caddy snippet at /etc/caddy/conf.d/ollama.conf as a reference for adding HTTPS via a domain later

constraints:
  ENG:
    name: Engineering Constraints
    requirements:
      1: Every role is idempotent — safe to re-run on an already-provisioned host without side effects
      2: Bootstrap runs as root; user-level config (dotfiles) is out of scope and must not be written by any role
      3: Machine-specific shell state goes in ~/.zshrc.local or ~/.zshenv.local, never in files owned by dotfiles (e.g. .zshrc, .zshenv, .gitconfig)
      4: All role output (stdout and stderr) is captured to a timestamped log under /var/log/bootstrap/
      5: Roles run in declared order by default; an arbitrary subset can be passed as arguments to bootstrap.sh
      6: Docker-style role cache — full default runs skip roles whose script (+ common.sh) sha256 is unchanged since the last successful run; cache lives in /var/lib/bootstrap/cache/
      6-note: Cache is bypassed when explicit role arguments are passed; a failed role is never cached, so re-runs always retry it
      6-1: Role-specific skip flags are folded into the cache hash so a flag change invalidates the cache — 20-hardening includes SKIP_SSH_HARDENING, 31-firewall includes SKIP_FIREWALL
      6-1-note: Prevents a DEV_MODE=1 iteration from poisoning subsequent production runs by silently skipping hardening/firewall on cache hit
      7: Secrets (TS_AUTHKEY, USER_PASSWORD) are passed inline only to their consuming roles via env -u; never exported globally and never written to log files
      8: DEV_MODE=1 is an umbrella escape hatch — sets SKIP_FIREWALL=1 and SKIP_SSH_HARDENING=1 so public SSH stays usable during bootstrap iteration; defaults to 0 and emits a loud warning when enabled
      8-note: Exposed in Terraform as var.dev_mode (bool, default false), threaded through cloud-init
