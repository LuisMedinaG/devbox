feature:
  name: bootstrap
  product: devbox
  description: Idempotent provisioning system for a fresh Ubuntu 24.04 host. Runs as root and sets up system baseline, user, security hardening, networking, dev tools, container runtime, shell, and language runtimes.

components:
  SYSTEM:
    name: System Baseline
    description: Role 00-system — OS-level foundations applied before any other role.
    requirements:
      1: Sets the host timezone from the TIMEZONE environment variable
      2: Enables unattended security upgrades with automatic nightly reboot at 02:00 when no users are logged in
      3: Creates a 2 GB swapfile if no swap is currently active, and persists it in /etc/fstab
      4: Configures sysctl for low swappiness (10), BBR TCP congestion control, and FQ qdisc
      5: Rotates bootstrap logs weekly, keeping 8 weeks of history
      6: Suppresses MOTD noise (pending-update counts, ESM ads, release-upgrade nags) since unattended-upgrades handles patching

  USER:
    name: User Provisioning
    description: Role 10-user — creates the interactive user and configures SSH access.
    requirements:
      1: Creates the user defined by USERNAME if it does not already exist
      2: Enables systemd linger for the user so user services survive logout
      3: Grants only a narrow sudo allowlist — no NOPASSWD:ALL
      3-note: Only /usr/bin/apt-get update is allowed without a password
      4: Installs SSH authorized keys from config/ssh-authorized-keys, falling back to /root/.ssh/authorized_keys if not present
      4-1: Aborts if no SSH key source is available, to prevent lock-out

  HARDENING:
    name: SSH and Service Hardening
    description: Role 20-hardening — SSH drop-in config and fail2ban. UFW is handled separately by role 31-firewall, which runs after Tailscale to prevent lock-out.
    requirements:
      1: Disables root login over SSH
      2: Disables password authentication over SSH; public key only
      3: Disables X11 forwarding
      4: Configures and enables fail2ban with the sshd jail active
      4-note: fail2ban runs even when SKIP_FIREWALL=1; that flag only suppresses UFW

  TAILSCALE:
    name: Tailscale Networking
    description: Role 30-tailscale — installs Tailscale and enrolls the host into the tailnet. UFW port 22 restriction is handled by role 31-firewall after this role completes.
    requirements:
      1: Installs and enables the tailscaled service
      2: Connects to the tailnet with Tailscale SSH enabled (tailscale up --ssh)
      3: Accepts an optional TS_AUTHKEY for unattended enrollment
      3-1: Clears TS_AUTHKEY from the environment immediately after role 30 completes so no other role inherits it
      4: TS_AUTHKEY must never appear in bootstrap log files

  FIREWALL:
    name: Firewall (UFW)
    description: Role 31-firewall — runs after Tailscale so public SSH is never closed before the Tailscale overlay is available.
    requirements:
      1: Activates UFW with default deny-incoming policy
      2: Opens SSH (port 22) and Mosh (UDP 60000-61000) in UFW
      2-note: UFW initialization is skipped if already active, to preserve rules added by later roles
      3: Once Tailscale is connected, restricts port 22 to the Tailscale CGNAT range (100.64.0.0/10) and removes the broad OpenSSH UFW rule
      3-note: If Tailscale is not connected, port 22 remains open and a warning is emitted; re-running ensures recovery is always possible

  DEV_TOOLS:
    name: Developer Tools
    description: Role 40-dev-tools — installs the core CLI toolchain.
    requirements:
      1: Installs git, tmux, zsh, ripgrep, fzf, btop, neovim, zoxide, eza, python3, mosh, yadm

  DOCKER:
    name: Container Runtime
    description: Role 42-docker — rootless Podman for the interactive user.
    requirements:
      1: Installs rootless Podman for the USERNAME user
      2: User is NOT added to any docker group
      3: Podman reports rootless=true when invoked as the user
      4: Enables the per-user Podman socket (podman.socket) via systemd --user
      5: Exports DOCKER_HOST pointing at the Podman socket in ~/.zshenv.local so Dev Containers tooling works without Docker
      6: Ensures subuid/subgid ranges are allocated for the user (100000-165535) if not already set

  SHELL:
    name: Shell Configuration
    description: Role 50-shell — sets zsh as the default shell and writes machine-specific PATH entries.
    requirements:
      1: Sets zsh as the default shell for USERNAME
      2: Creates an empty ~/.zshrc if one does not exist, so yadm clone has a file to replace
      2-note: Bootstrap must not write any config into ~/.zshrc itself; dotfiles own that file
      3: Writes machine-specific PATH entries (fnm, cargo, go, ~/.local/bin) to ~/.zshrc.local, not to files tracked by dotfiles

  LANGS:
    name: Language Runtimes
    description: Role 60-langs — installs pinned language runtimes with sha256 verification.
    requirements:
      1: Installs fnm (Fast Node Manager) at the version pinned in versions.conf, then installs and defaults the latest LTS Node
      2: Installs uv and uvx (Python toolchain) at the version pinned in versions.conf
      3: Installs Bun at the version pinned in versions.conf
      4: Installs Rust via a pinned rustup-init binary
      5: Installs Go at the version pinned in versions.conf to /usr/local/go
      6: Aborts if any sha256 hash entry in versions.conf is empty or missing
      7: Verifies the sha256 of every downloaded artifact before executing or extracting it; aborts on mismatch
      7-note: Downloads are skipped if the file is already present and the hash matches, making re-runs fast
      8: Supports both amd64 and arm64 architectures; aborts on any other architecture

  TERRAFORM:
    name: Infrastructure Provisioning
    description: terraform/ — declarative Hetzner Cloud server provisioning, as an alternative to hcloud CLI.
    requirements:
      1: Provisions a Hetzner Cloud server with configurable name, type, image, and location
      2: Attaches SSH keys by referencing existing Hetzner project keys by name, not by uploading them
      2-note: At least one ssh_key_names entry is required; the validation rejects empty or whitespace-only entries
      3: Accepts the Hetzner API token via HCLOUD_TOKEN environment variable or terraform.tfvars (gitignored)
      4: Outputs the server's public IPv4 address after apply

  VERSIONS:
    name: Version Management
    description: bootstrap/update-versions.sh — checks and updates pinned runtime versions in config/versions.conf.
    requirements:
      1: In check mode (default), reports which tools are up to date and which have a newer upstream release
      2: In update mode (--update flag), rewrites versions.conf in place with new versions and sha256 hashes
      3: Supports filtering to a single tool by passing its name as an argument
      4: Fetches upstream release info without executing downloaded artifacts (hash-only fetch for sha256 computation)
      5: Validates that fetched versions are valid semver before writing; skips tools where the upstream version cannot be parsed
      6: Supports GITHUB_TOKEN to avoid API rate limiting when fetching GitHub release metadata

  DOTFILES:
    name: Dotfiles Deployment
    description: Role 80-dotfiles — clones and bootstraps user dotfiles via yadm.
    requirements:
      1: Clones the dotfiles git repo via yadm as the interactive user
      2: Runs yadm bootstrap to install user-level tooling (Homebrew packages, configs)
      2-note: Fails gracefully with a warning if GitHub SSH is not configured yet
      3: Supports HTTPS clone via DOTFILES_TOKEN (GitHub PAT with repo read scope); converts the SSH URL to HTTPS, writes the token to a temporary ~/.netrc that is removed via trap on exit, and never exposes the token in argv or process environment
      4: When cloning via SSH, pre-checks GitHub connectivity with BatchMode=yes, ConnectTimeout=10, and StrictHostKeyChecking=accept-new so authentication failures surface in seconds instead of hanging
      5: Passes --no-bootstrap to yadm clone and runs yadm bootstrap explicitly afterward, avoiding interactive prompts and double-runs in non-TTY contexts

  CLAUDE_CODE:
    name: Claude Code
    description: Role 70-claude-code — installs Claude Code globally via npm.
    requirements:
      1: Installs @anthropic-ai/claude-code globally via npm as the interactive user

constraints:
  ENG:
    name: Engineering Constraints
    requirements:
      1: Every role is idempotent — safe to re-run on an already-provisioned host without side effects
      2: Bootstrap runs as root; user-level config (dotfiles) is out of scope and must not be written by any role
      3: Machine-specific shell state goes in ~/.zshrc.local or ~/.zshenv.local, never in files owned by dotfiles (e.g. .zshrc, .zshenv, .gitconfig)
      4: All role output (stdout and stderr) is captured to a timestamped log under /var/log/bootstrap/
      5: Roles run in declared order by default; an arbitrary subset can be passed as arguments to bootstrap.sh
