# SOPS configuration — controls which age keys can decrypt each secret file.
# The devbox age key is generated on first boot by cloud-init:
#   age-keygen -o /root/age/identity.txt
# The public key is printed to stdout; copy it here to register it.
#
# Usage:
#   sops secrets/devbox/tailscale-authkey.yaml   # create/edit a secret
#   sops -d secrets/devbox/tailscale-authkey.yaml  # decrypt for inspection
#
# See: https://github.com/Mic92/sops-nix

keys:
  - &devbox age1REPLACE_WITH_DEVBOX_AGE_PUBLIC_KEY

creation_rules:
  - path_regex: secrets/devbox/.*\.yaml$
    key_groups:
      - age:
          - *devbox
